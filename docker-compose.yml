services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DATABASE_URL: sqlite+aiosqlite:////data/app.db
      UPLOAD_DIR: /data/storage
      CORS_ORIGINS: '["https://arg0n.ru","https://www.arg0n.ru"]'
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - backend-data:/data
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - web

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - web

volumes:
  backend-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  web:
    driver: bridge
